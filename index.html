  :root{

    --text:#e8eef4;--muted:#5a7a8a;--white:#fff;

  .header{background:linear-gradient(90deg,#050d0a 0%,#080d14 60%);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;position:sticky;top:0;z-index:100}
  .logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--white);display:flex;align-items:center;gap:8px}
  .logo span{color:var(--green)}
  .nav{display:flex;gap:4px}
  .nav-btn{background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;padding:5px 11px;letter-spacing:0.3px;transition:all .15s}
  .nav-btn.active{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.25);color:var(--green)}
  .nav-btn:hover:not(.active){color:var(--text)}
  .user-chip{align-items:center;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;display:flex;font-size:12px;gap:8px;padding:4px 12px}
  .user-chip .rank{color:var(--green);font-weight:800}
  .logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;line-height:1}
  .main{max-width:680px;margin:0 auto;padding:24px 16px}
  .auth-wrap{align-items:center;display:flex;justify-content:center;min-height:100vh;padding:20px}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:380px;padding:40px 36px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.6)}
  .auth-icon{font-size:48px;margin-bottom:12px;text-align:center}
  .auth-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:1px;color:var(--white);text-align:center;margin-bottom:4px}
  .auth-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:28px}
  .field-label{color:var(--muted);font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;display:block}
  .field-input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;outline:none;padding:11px 14px;width:100%;transition:border .15s;margin-bottom:14px;font-family:inherit}
  .field-input:focus{border-color:rgba(0,230,118,.4)}
  .btn-primary{background:linear-gradient(135deg,var(--green2),#00a040);border:none;border-radius:9px;color:#000;cursor:pointer;font-size:15px;font-weight:800;padding:13px 0;width:100%;letter-spacing:0.3px;transition:opacity .15s}
  .btn-primary:hover{opacity:.9}
  .auth-switch{color:var(--green);background:none;border:none;cursor:pointer;font-size:13px;text-decoration:underline;margin-top:14px}
  .err-box{background:rgba(255,61,87,.1);border:1px solid rgba(255,61,87,.3);border-radius:8px;color:#ff6b7a;font-size:13px;margin-bottom:14px;padding:9px 12px}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:0.5px;color:var(--white)}
  .section-sub{color:var(--muted);font-size:13px;margin-bottom:20px;margin-top:2px}
  .points-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-wrap:wrap;gap:14px;margin-bottom:20px;padding:12px 16px}
  .pt-pill{font-size:12px;font-weight:600}
  .match-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border .2s}
  .match-card.locked{border-color:#1e3a28;background:#0a1810}
  .match-header{align-items:center;display:flex;justify-content:space-between;padding:12px 16px 0}
  .group-tag{background:rgba(0,230,118,.1);border-radius:4px;color:var(--green);font-size:11px;font-weight:700;letter-spacing:0.8px;padding:2px 8px;text-transform:uppercase}
  .match-status{font-size:12px;font-weight:600}
  .match-status.locked{color:var(--muted)}
  .match-status.result{color:var(--green)}
  .teams-row{align-items:center;display:flex;justify-content:space-between;padding:14px 20px}
  .team{align-items:center;display:flex;flex-direction:column;flex:1;gap:5px;text-align:center}
  .team-flag{font-size:34px;line-height:1}
  .team-name{color:#c8d8e4;font-size:12px;font-weight:700;letter-spacing:0.3px}
  .vs{color:var(--border);font-size:14px;font-weight:600;padding:0 10px}
  .score-row{align-items:center;display:flex;gap:10px;justify-content:center;padding:0 16px 16px}
  .score-input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--white);font-size:22px;font-weight:800;outline:none;padding:8px 0;text-align:center;width:56px;transition:border .15s;font-family:inherit}
  .score-input:focus{border-color:rgba(0,230,118,.4)}
  .score-dash{color:var(--muted);font-size:18px}
  .save-all-btn{background:linear-gradient(135deg,var(--green2),#00a040);border:none;border-radius:11px;color:#000;cursor:pointer;font-size:15px;font-weight:800;padding:14px 0;width:100%;margin-top:8px;letter-spacing:0.3px;transition:opacity .15s}
  .save-all-btn:hover{opacity:.9}
  .pred-display{padding:4px 16px 14px;text-align:center}
  .pred-label{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px}

  .pred-score.my{color:var(--green)}
  .pred-score.actual{color:var(--white);margin-top:6px}
  .empty{color:var(--muted);padding:60px 20px;text-align:center}
  .empty-icon{font-size:44px;margin-bottom:12px}
  .empty-title{color:#c8d8e4;font-size:16px;font-weight:700;margin-bottom:6px}

  .history-table{width:100%;border-collapse:collapse;font-size:13px}
  .history-table th{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
  .history-table td{padding:11px 12px;border-bottom:1px solid rgba(30,45,61,.5);vertical-align:middle}
  .history-table tr:last-child td{border-bottom:none}
  .history-table tr:hover td{background:rgba(255,255,255,.02)}
  .outcome-badge{border-radius:6px;font-size:12px;font-weight:700;padding:3px 8px;display:inline-block}
  .outcome-badge.exact{background:rgba(255,214,0,.15);color:var(--gold)}
  .outcome-badge.correct{background:rgba(0,230,118,.12);color:var(--green)}
  .outcome-badge.wrong{background:rgba(255,61,87,.12);color:var(--red)}
  .outcome-badge.pending{background:rgba(90,122,138,.12);color:var(--muted)}

  .pts-cell.correct{color:var(--green)}
  .pts-cell.wrong{color:var(--red)}

  .toast{background:var(--green2);border-radius:22px;bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.5);color:#000;font-size:13px;font-weight:800;left:50%;padding:10px 24px;pointer-events:none;position:fixed;transform:translateX(-50%);z-index:999}

// ── FIREBASE ──────────────────────────────────────────────────────────────────
async function fbSet(path, data) {
  try { await setDoc(doc(db,...path.split("/")), data, {merge:true}); } catch(e){console.error(e);}
}

// ── POINTS (draw-aware) ───────────────────────────────────────────────────────
function winner(h, a) {
  const hh = Number(h), aa = Number(a);
  return hh > aa ? "h" : hh < aa ? "a" : "d";
}
function calcPoints(uid) {
  const preds = S.predictions[uid] || {};
  let pts = 0;
  for (const [mid, pred] of Object.entries(preds)) {
    const res = S.results[mid];
    if (!res) continue;
    const pw = winner(pred.h, pred.a);
    const rw = winner(res.h, res.a);
    if (pw === rw) {
      pts += (String(pred.h)===String(res.h) && String(pred.a)===String(res.a)) ? 7 : 3;
    }
  }
  return pts + (S.bonuses[uid] || 0);
}
function leaderboard() {
  return Object.keys(S.users).map(uid => ({
    uid, username:S.users[uid].username, pts:calcPoints(uid),
  })).sort((a,b) => b.pts - a.pts);
}
function myRank() {
  const b = leaderboard(); return b.findIndex(x=>x.uid===S.me)+1;
}

// ── DATE ─────────────────────────────────────────────────────────────────────
function todayStr() {
  // Always use German time (CET = UTC+1, CEST = UTC+2 in summer)
  const now = new Date();
  const germanTime = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Berlin"}));
  return `${germanTime.getFullYear()}-${String(germanTime.getMonth()+1).padStart(2,"0")}-${String(germanTime.getDate()).padStart(2,"0")}`;
}
function allMatches() {
  return [...GROUP_MATCHES,...S.knockoutMatches].sort((a,b)=>a.date>b.date?1:-1);
}
function todayMatches() {
  const t = todayStr();
  // Show today + next 2 days so users can predict ahead
  const d0 = new Date(t+"T12:00:00");
  const d2 = new Date(d0); d2.setDate(d0.getDate()+2);
  const d2str = d2.toISOString().slice(0,10);
  return allMatches().filter(m => m.date >= t && m.date <= d2str);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  if(S.toastTimer) clearTimeout(S.toastTimer);
  S.toast=msg; render();
  S.toastTimer=setTimeout(()=>{S.toast="";render();},2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  // Real-time listeners
  onSnapshot(doc(db,"wc26","users"), snap => {
    if(snap.exists()) S.users=snap.data();
    else S.users={};
    if(S.screen==="loading") checkReady();
    else render();
  });
  onSnapshot(doc(db,"wc26","predictions"), snap => {
    if(snap.exists()) S.predictions=snap.data(); else S.predictions={};
    render();
  });
  onSnapshot(doc(db,"wc26","results"), snap => {
    if(snap.exists()) S.results=snap.data().data||{}; else S.results={};
    render();
  });
  onSnapshot(doc(db,"wc26","bonuses"), snap => {
    if(snap.exists()) S.bonuses=snap.data(); else S.bonuses={};
    render();
  });
  onSnapshot(doc(db,"wc26","knockouts"), snap => {
    if(snap.exists()) S.knockoutMatches=snap.data().matches||[]; else S.knockoutMatches=[];
    render();
  });
  // Always seed data then show login
  await fbSet("wc26/users", SEED_USERS);
  await fbSet("wc26/predictions", SEED_PREDICTIONS);
  await fbSet("wc26/results", {data: SEED_RESULTS});
  const saved = sessionStorage.getItem("wc26_user");
  // Wait briefly for listeners to fire
  setTimeout(() => {
    if(saved && S.users[saved]) { S.me=saved; S.screen="app"; }
    else S.screen="login";
    render();
  }, 1500);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function register() {
  const {u,p}=S.authForm;
  if(!u.trim()||!p.trim()){S.authErr="Fill in both fields.";render();return;}
  const uid=u.toLowerCase().replace(/\s+/g,"_");
  if(S.users[uid]){S.authErr="Username already taken.";render();return;}
  S.users[uid]={username:u,password:p};
  await fbSet("wc26/users",S.users);
  sessionStorage.setItem("wc26_user",uid);
  S.me=uid;S.screen="app";S.authErr="";render();
}
async function login() {
  const {u,p}=S.authForm;
  const uid=u.toLowerCase().replace(/\s+/g,"_");
  const user=S.users[uid];
  if(!user){S.authErr="User not found.";render();return;}
  if(user.password!==p){S.authErr="Wrong password.";render();return;}
  sessionStorage.setItem("wc26_user",uid);
  S.me=uid;S.screen="app";S.authErr="";render();
}
function logout(){
  sessionStorage.removeItem("wc26_user");
  S.me=null;S.screen="login";S.authForm={u:"",p:""};render();
}
async function saveAllPredictions() {
  const matches = todayMatches().filter(m=>!S.predictions[S.me]?.[m.id]);
  let saved=0;
  for(const m of matches){
    const inp=S.scoreInputs[m.id];
    if(!inp||inp.h===""||inp.a==="") continue;
    if(!S.predictions[S.me]) S.predictions[S.me]={};
    S.predictions[S.me][m.id]={h:inp.h,a:inp.a};
    saved++;
  }
  if(!saved){toast("No new predictions to save");return;}
  await fbSet("wc26/predictions",S.predictions);
  toast(`${saved} prediction${saved>1?"s":""} locked! 🔒`);
  render();
}
async function saveResult(mid) {
  const inp=S.adminInputs[mid];
  if(!inp||inp.h===""||inp.a==="") return;
  S.results[mid]={h:inp.h,a:inp.a};
  await fbSet("wc26/results",{data:S.results});
  toast("Result saved ✓"); render();
}
async function saveBonus(uid) {
  const val=parseInt(S.bonusInputs[uid]||0);
  if(!val) return;
  S.bonuses[uid]=(S.bonuses[uid]||0)+val;
  await fbSet("wc26/bonuses",S.bonuses);
  S.bonusInputs[uid]="";
  toast(`+${val} pts → ${S.users[uid]?.username} ✓`); render();
}
async function addKnockoutMatch(date,home,away,round) {
  const newId=1000+S.knockoutMatches.length+1;
  S.knockoutMatches.push({id:newId,date,home,away,group:round});
  await fbSet("wc26/knockouts",{matches:S.knockoutMatches});
  toast("Knockout match added ✓"); render();
}

  if(S.adminPwInput===ADMIN_PW){S.adminUnlocked=true;S.adminPwErr=false;}
  else{S.adminPwErr=true;S.adminPwInput="";}

}

function renderHistory() {
  const preds=S.predictions[S.me]||{};
  const items=Object.entries(preds).map(([mid,pred])=>{
    const match=allMatches().find(m=>m.id===Number(mid));
    const res=S.results[mid];
    let outcome="pending",pts=0;
    if(res){
      const pw=winner(pred.h,pred.a), rw=winner(res.h,res.a);
      if(pw===rw){
        pts=(String(pred.h)===String(res.h)&&String(pred.a)===String(res.a))?7:3;
        outcome=pts===7?"exact":"correct";
      } else outcome="wrong";
    }
    return {mid,match,pred,res,outcome,pts};
  }).sort((a,b)=>(b.match?.date||"")>(a.match?.date||"")?1:-1);

  const totalPts=calcPoints(S.me);
  const rank=myRank();
  const rankLabel=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":`#${rank}`;

  return `

            </td>

  const authU=document.getElementById("auth-u");
  const authP=document.getElementById("auth-p");
  if(authU) authU.addEventListener("input",e=>{S.authForm.u=e.target.value;});
  if(authP){
    authP.addEventListener("input",e=>{S.authForm.p=e.target.value;});
    authP.addEventListener("keydown",e=>{if(e.key==="Enter") S.screen==="register"?register():login();});
  }
  document.getElementById("auth-submit")?.addEventListener("click",()=>S.screen==="register"?register():login());
  document.getElementById("auth-toggle")?.addEventListener("click",()=>{S.screen=S.screen==="login"?"register":"login";S.authErr="";render();});
  document.querySelectorAll(".nav-btn[data-tab]").forEach(btn=>btn.addEventListener("click",()=>{S.tab=btn.dataset.tab;render();}));
  document.getElementById("logout-btn")?.addEventListener("click",logout);
  document.querySelectorAll(".score-input[data-mid]").forEach(inp=>inp.addEventListener("input",e=>{
    const mid=e.target.dataset.mid,side=e.target.dataset.side;
    if(!S.scoreInputs[mid]) S.scoreInputs[mid]={h:"",a:""};
    S.scoreInputs[mid][side]=e.target.value;
  }));
  document.getElementById("save-all-btn")?.addEventListener("click",saveAllPredictions);
  const adminPwInp=document.getElementById("admin-pw-input");
  if(adminPwInp){
    adminPwInp.addEventListener("input",e=>{S.adminPwInput=e.target.value;S.adminPwErr=false;});
    adminPwInp.addEventListener("keydown",e=>{if(e.key==="Enter")checkAdminPw();});
  }
  document.getElementById("admin-pw-submit")?.addEventListener("click",checkAdminPw);
  document.getElementById("admin-lock")?.addEventListener("click",()=>{S.adminUnlocked=false;render();});
  document.querySelectorAll(".admin-input[data-amid]").forEach(inp=>inp.addEventListener("input",e=>{
    const mid=e.target.dataset.amid,side=e.target.dataset.side;
    if(!S.adminInputs[mid]) S.adminInputs[mid]={h:"",a:""};
    S.adminInputs[mid][side]=e.target.value;
  }));
  document.querySelectorAll(".admin-save-btn[data-save-result]").forEach(btn=>btn.addEventListener("click",()=>saveResult(btn.dataset.saveResult)));
  document.querySelectorAll(".bonus-input[data-bonus-uid]").forEach(inp=>inp.addEventListener("input",e=>{S.bonusInputs[e.target.dataset.bonusUid]=e.target.value;}));
  document.querySelectorAll(".bonus-btn[data-award-bonus]").forEach(btn=>btn.addEventListener("click",()=>saveBonus(btn.dataset.awardBonus)));
  document.getElementById("ko-add-btn")?.addEventListener("click",()=>{
    const date=document.getElementById("ko-date")?.value;
    const home=document.getElementById("ko-home")?.value?.trim();
    const away=document.getElementById("ko-away")?.value?.trim();
    const round=document.getElementById("ko-round")?.value?.trim()||"KO";
    if(!date||!home||!away){toast("Fill in all fields");return;}
    addKnockoutMatch(date,home,away,round);
  });
}

init();
</script>
</body>
</html>
