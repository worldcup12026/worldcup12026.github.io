// ─── FIREBASE HELPERS ─────────────────────────────────────────────────────────
async function fbGet(docPath) {
  try {
    const snap = await getDoc(doc(db, ...docPath.split("/")));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.error(e); return null; }
}
async function fbSet(docPath, data) {
  try { await setDoc(doc(db, ...docPath.split("/")), data, {merge:true}); }
  catch(e) { console.error(e); }
}

// ─── POINTS ──────────────────────────────────────────────────────────────────
function calcPoints(uid) {
  const preds = state.predictions[uid] || {};
  const res = state.results;
  const bonus = state.bonuses[uid] || 0;
  let pts = 0;
  for (const [mid, pred] of Object.entries(preds)) {
    const r = res[mid];
    if (!r) continue;
    const pw = pred.h > pred.a ? "h" : pred.h < pred.a ? "a" : "d";
    const rw = r.h > r.a ? "h" : r.h < r.a ? "a" : "d";
    if (pw === rw) pts += (String(pred.h)===String(r.h) && String(pred.a)===String(r.a)) ? 7 : 3;
  }
  return pts + bonus;
}

function leaderboard() {
  return Object.keys(state.users).map(uid => ({
    uid,
    username: state.users[uid].username,
    pts: calcPoints(uid),
  })).sort((a,b) => b.pts - a.pts);
}

function myRank() {
  const board = leaderboard();
  return board.findIndex(x => x.uid === state.me) + 1;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function allMatches() {
  return [...GROUP_MATCHES, ...state.knockoutMatches].sort((a,b) => a.date > b.date ? 1 : -1);
}

function todayMatches() {
  const t = todayStr();
  return allMatches().filter(m => m.date === t);
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg) {
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toast = msg;
  render();
  state.toastTimer = setTimeout(() => { state.toast = ""; render(); }, 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // Load all data from Firestore
  const [users, predictions, results, bonuses, knockouts] = await Promise.all([
    fbGet("wc26/users"),
    fbGet("wc26/predictions"),
    fbGet("wc26/results"),
    fbGet("wc26/bonuses"),
    fbGet("wc26/knockouts"),
  ]);
  state.users = users || {};
  state.predictions = predictions || {};
  state.results = results?.data || {};
  state.bonuses = bonuses || {};
  state.knockoutMatches = knockouts?.matches || [];

  // Real-time listeners for results and leaderboard
  onSnapshot(doc(db,"wc26","results"), snap => {
    if (snap.exists()) { state.results = snap.data().data || {}; render(); }
  });
  onSnapshot(doc(db,"wc26","predictions"), snap => {
    if (snap.exists()) { state.predictions = snap.data() || {}; render(); }
  });
  onSnapshot(doc(db,"wc26","bonuses"), snap => {
    if (snap.exists()) { state.bonuses = snap.data() || {}; render(); }
  });
  onSnapshot(doc(db,"wc26","knockouts"), snap => {
    if (snap.exists()) { state.knockoutMatches = snap.data().matches || []; render(); }
  });

  // Check saved session
  const savedUser = sessionStorage.getItem("wc26_user");
  if (savedUser && state.users[savedUser]) {
    state.me = savedUser;
    state.screen = "app";
  } else {
    state.screen = "login";
  }
  render();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
async function register() {
  const {u, p} = state.authForm;
  if (!u.trim() || !p.trim()) { state.authErr = "Fill in both fields."; render(); return; }
  const uid = u.toLowerCase().replace(/\s+/g,"_");
  if (state.users[uid]) { state.authErr = "Username already taken."; render(); return; }
  state.users[uid] = {username: u, password: p};
  await fbSet("wc26/users", state.users);
  sessionStorage.setItem("wc26_user", uid);
  state.me = uid; state.screen = "app"; state.authErr = ""; render();
}

async function login() {
  const {u, p} = state.authForm;
  const uid = u.toLowerCase().replace(/\s+/g,"_");
  const user = state.users[uid];
  if (!user) { state.authErr = "User not found."; render(); return; }
  if (user.password !== p) { state.authErr = "Wrong password."; render(); return; }
  sessionStorage.setItem("wc26_user", uid);
  state.me = uid; state.screen = "app"; state.authErr = ""; render();
}

function logout() {
  sessionStorage.removeItem("wc26_user");
  state.me = null; state.screen = "login"; state.authForm = {u:"",p:""}; render();
}

async function savePrediction(mid) {
  const inp = state.scoreInputs[mid];
  if (!inp || inp.h === "" || inp.a === "") return;
  if (!state.predictions[state.me]) state.predictions[state.me] = {};
  state.predictions[state.me][mid] = {h: inp.h, a: inp.a};
  await fbSet("wc26/predictions", state.predictions);
  state.savedFlash[mid] = true;
  render();
  setTimeout(() => { delete state.savedFlash[mid]; render(); }, 1500);
  toast("Prediction locked! 🔒");
}

async function saveResult(mid) {
  const inp = state.adminInputs[mid];
  if (!inp || inp.h === "" || inp.a === "") return;
  state.results[mid] = {h: inp.h, a: inp.a};
  await fbSet("wc26/results", {data: state.results});
  toast("Result saved ✓");
  render();
}

async function saveBonus(uid) {
  const val = parseInt(state.bonusInputs[uid] || 0);
  if (!val) return;
  state.bonuses[uid] = (state.bonuses[uid] || 0) + val;
  await fbSet("wc26/bonuses", state.bonuses);
  state.bonusInputs[uid] = "";
  toast(`+${val} pts awarded to ${state.users[uid]?.username} ✓`);
  render();
}

async function addKnockoutMatch(date, home, away, round) {
  const newId = 1000 + state.knockoutMatches.length + 1;
  state.knockoutMatches.push({id: newId, date, home, away, group: round});
  await fbSet("wc26/knockouts", {matches: state.knockoutMatches});
  toast(`Match added ✓`);
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (state.screen === "loading") {
    root.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Loading...</div></div>`;
    return;
  }
  if (state.screen === "login" || state.screen === "register") {
    root.innerHTML = renderAuth();
  } else {
    root.innerHTML = renderApp();
  }
  attachEvents();
}

function renderAuth() {
  const isReg = state.screen === "register";
  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-icon">⚽</div>
      <div class="auth-title">WC 2026</div>
      <div class="auth-sub">${isReg ? "Create your account to start predicting" : "Sign in and make your picks"}</div>
      ${state.authErr ? `<div class="err-box">${state.authErr}</div>` : ""}
      <label class="field-label">Username</label>
      <input class="field-input" id="auth-u" type="text" placeholder="e.g. erdoen" value="${state.authForm.u}" autocomplete="username"/>
      <label class="field-label">Password</label>
      <input class="field-input" id="auth-p" type="password" placeholder="••••••••" value="${state.authForm.p}" autocomplete="${isReg?"new-password":"current-password"}"/>
      <button class="btn-primary" id="auth-submit">${isReg ? "Create Account" : "Sign In"}</button>
      <div style="text-align:center">
        <button class="auth-switch" id="auth-toggle">
          ${isReg ? "Already have an account? Sign in" : "New here? Create account"}
        </button>
      </div>
    </div>
  </div>`;
}

function renderApp() {
  const rank = myRank();
  const rankLabel = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : `#${rank}`;
  const uname = state.users[state.me]?.username || state.me;
  const myPts = calcPoints(state.me);

  return `
  <div class="header">
    <div class="logo">⚽ <span>WC</span> 2026</div>
    <nav class="nav">
      ${["today","history","board","admin"].map(t => `
        <button class="nav-btn ${state.tab===t?"active":""}" data-tab="${t}">
          ${{today:"Today",history:"History",board:"Board",admin:"Admin"}[t]}
        </button>`).join("")}
    </nav>
    <div class="user-chip">
      <span class="rank">${rankLabel}</span>
      <span>${uname}</span>
      <button class="logout-btn" id="logout-btn">✕</button>
    </div>
  </div>
  <div class="main">
    ${state.tab === "today"   ? renderToday()     : ""}
    ${state.tab === "history" ? renderHistory()   : ""}
    ${state.tab === "board"   ? renderBoard()     : ""}
    ${state.tab === "admin"   ? renderAdmin()     : ""}
  </div>
  ${state.toast ? `<div class="toast">${state.toast}</div>` : ""}`;
}

function renderToday() {
  const matches = todayMatches();
  const dateLabel = new Date(todayStr()+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  return `
  <div class="section-title">Today's Matches</div>
  <div class="section-sub">${dateLabel}</div>
  <div class="points-bar">
    <span class="pt-pill" style="color:var(--green)">✅ Correct winner = 3 pts</span>
    <span class="pt-pill" style="color:var(--gold)">🎯 Exact score = 7 pts</span>
    <span class="pt-pill" style="color:#a78bfa">📅 Daily top scorer = +100 pts</span>
    <span class="pt-pill" style="color:#f9a8d4">🏆 Tournament winner = +50 pts</span>
  </div>
  ${matches.length === 0
    ? `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No matches today</div><div>Check back on a match day!</div></div>`
    : matches.map(m => renderMatchCard(m)).join("")}`;
}

function renderMatchCard(m) {
  const pred = state.predictions[state.me]?.[m.id];
  const locked = !!pred;
  const res = state.results[m.id];
  const inp = state.scoreInputs[m.id] || {h:"",a:""};
  const flash = state.savedFlash[m.id];

  return `
  <div class="match-card ${locked?"locked":""}">
    <div class="match-header">
      <span class="group-tag">Group ${m.group}</span>
      <span class="match-status ${res?"result":locked?"locked":""}">
        ${res ? "✓ Result in" : locked ? "🔒 Locked" : ""}
      </span>
    </div>
    <div class="teams-row">
      <div class="team"><div class="team-flag">${flag(m.home)}</div><div class="team-name">${m.home}</div></div>
      <div class="vs">vs</div>
      <div class="team"><div class="team-flag">${flag(m.away)}</div><div class="team-name">${m.away}</div></div>
    </div>
    ${locked
      ? `<div class="pred-display">
          <div class="pred-label">Your prediction</div>
          <div class="pred-score my">${pred.h} — ${pred.a}</div>
          ${res ? `<div class="pred-label" style="margin-top:10px">Final score</div><div class="pred-score actual">${res.h} — ${res.a}</div>` : ""}
        </div>`
      : `<div class="score-row">
          <input class="score-input" type="number" min="0" max="20" placeholder="0" value="${inp.h}" data-mid="${m.id}" data-side="h"/>
          <span class="score-dash">—</span>
          <input class="score-input" type="number" min="0" max="20" placeholder="0" value="${inp.a}" data-mid="${m.id}" data-side="a"/>
          <button class="save-btn ${flash?"saved":""}" data-save="${m.id}">${flash?"✓ Saved":"Save"}</button>
        </div>`}
  </div>`;
}

function renderHistory() {
  const preds = state.predictions[state.me] || {};
  const items = Object.entries(preds).map(([mid,pred]) => {
    const match = allMatches().find(m => m.id === Number(mid));
    const res = state.results[mid];
    let outcome = "pending", pts = 0;
    if (res) {
      const pw = pred.h > pred.a ? "h" : pred.h < pred.a ? "a" : "d";
      const rw = res.h > res.a ? "h" : res.h < res.a ? "a" : "d";
      if (pw === rw) {
        pts = (String(pred.h)===String(res.h) && String(pred.a)===String(res.a)) ? 7 : 3;
        outcome = pts === 7 ? "exact" : "correct";
      } else outcome = "wrong";
    }
    return {mid, match, pred, res, outcome, pts};
  }).sort((a,b) => (b.match?.date||"") > (a.match?.date||"") ? 1 : -1);

  const totalPts = calcPoints(state.me);
  const rank = myRank();

  return `
  <div class="section-title">My Predictions</div>
  <div class="section-sub">Total: <strong style="color:var(--green)">${totalPts} pts</strong> · Rank ${rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"#"+rank}</div>
  ${items.length === 0
    ? `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No predictions yet</div><div>Head to Today to make your first pick</div></div>`
    : items.map(({mid,match,pred,res,outcome,pts}) => `
      <div class="history-item ${outcome}">
        <div style="flex:1">
          <div class="history-match">${match ? `${flag(match.home)} ${match.home} vs ${match.away} ${flag(match.away)}` : `Match #${mid}`}
            ${match ? `<span style="color:var(--muted);font-weight:400;font-size:12px;margin-left:6px">${match.date}</span>` : ""}
          </div>
          <div class="history-scores">
            <span>📝 Pick: <strong>${pred.h}–${pred.a}</strong></span>
            ${res ? `<span>📊 Result: <strong>${res.h}–${res.a}</strong></span>` : `<span>⏳ Awaiting result</span>`}
          </div>
        </div>
        <div class="history-pts ${outcome}">
          ${outcome==="exact"?"🎯 +7":outcome==="correct"?"✓ +3":outcome==="wrong"?"✗ 0":"—"}
        </div>
      </div>`).join("")}`;
}

function renderBoard() {
  const board = leaderboard();
  return `
  <div class="section-title">Leaderboard</div>
  <div class="section-sub">${board.length} player${board.length!==1?"s":""} · Updates in real time</div>
  ${board.map((entry,i) => `
    <div class="lb-card rank-${i<3?i+1:"other"}">
      <div class="lb-rank">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
      <div class="lb-name">${entry.username}${entry.uid===state.me?`<span class="lb-you">you</span>`:""}</div>
      <div class="lb-pts">${entry.pts} <span>pts</span></div>
    </div>`).join("")}
  ${board.length===0?`<div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">No players yet</div></div>`:""}
  <div class="scoring-box">
    <div class="scoring-box-title">🏆 Scoring System</div>
    <div>✅ Correct winner → <strong style="color:var(--green)">3 pts</strong></div>
    <div>🎯 Exact score → <strong style="color:var(--gold)">7 pts</strong></div>
    <div>📅 Daily top scorer bonus → <strong style="color:#a78bfa">+100 pts</strong></div>
    <div>🏆 Tournament winner prediction → <strong style="color:#f9a8d4">+50 pts</strong></div>
  </div>`;
}

function renderAdmin() {
  if (!state.adminUnlocked) {
    return `
    <div class="admin-gate">
      <div class="lock-icon">🔐</div>
      <div class="gate-title">Admin Access</div>
      <div class="gate-sub">Enter the admin password to continue</div>
      ${state.adminPwErr ? `<div class="err-box" style="margin-bottom:12px">Wrong password.</div>` : ""}
      <input class="gate-input ${state.adminPwErr?"err":""}" id="admin-pw-input" type="password" placeholder="Password" value="${state.adminPwInput}"/>
      <button class="gate-btn" id="admin-pw-submit">Unlock</button>
    </div>`;
  }

  const today = todayStr();
  const pastMatches = allMatches().filter(m => m.date <= today);

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div class="section-title">Admin Panel</div>
    <button class="lock-btn" id="admin-lock">🔒 Lock</button>
  </div>
  <div class="section-sub">Enter results & award bonus points</div>

  <div class="admin-section-title">⚽ Match Results</div>
  ${pastMatches.map(m => {
    const res = state.results[m.id];
    const inp = state.adminInputs[m.id] || {h:"",a:""};
    return `
    <div class="admin-card">
      <div class="admin-match-date">${m.date} · ${m.group}</div>
      <div class="admin-match-title">${flag(m.home)} ${m.home} vs ${m.away} ${flag(m.away)}</div>
      <div class="admin-row">
        <input class="admin-input" type="number" min="0" max="20" placeholder="${res?.h??0}" value="${inp.h}" data-amid="${m.id}" data-side="h"/>
        <span style="color:var(--muted)">—</span>
        <input class="admin-input" type="number" min="0" max="20" placeholder="${res?.a??0}" value="${inp.a}" data-amid="${m.id}" data-side="a"/>
        <button class="admin-save-btn" data-save-result="${m.id}">${res?"Update":"Save"}</button>
        ${res ? `<span class="admin-saved">✓ ${res.h}–${res.a}</span>` : ""}
      </div>
    </div>`}).join("")}

  <div class="admin-section-title">🏆 Bonus Points</div>
  <div style="color:var(--muted);font-size:12px;margin-bottom:12px">Award +100 for daily top scorer, +50 for tournament winner, etc.</div>
  ${Object.keys(state.users).map(uid => `
    <div class="admin-card">
      <div class="bonus-row">
        <div class="bonus-name">${state.users[uid].username} <span class="bonus-current">(${state.bonuses[uid]||0} bonus pts)</span></div>
        <input class="bonus-input" type="number" placeholder="+pts" value="${state.bonusInputs[uid]||""}" data-bonus-uid="${uid}"/>
        <button class="bonus-btn" data-award-bonus="${uid}">Add</button>
      </div>
    </div>`).join("")}

  <div class="admin-section-title">➕ Add Knockout Match</div>
  <div style="color:var(--muted);font-size:12px;margin-bottom:12px">Add matches as the knockout rounds are confirmed</div>
  <div class="admin-card">
    <div style="display:grid;gap:10px">
      <div>
        <div class="field-label" style="font-size:11px">Date</div>
        <input class="field-input" id="ko-date" type="date" style="margin-bottom:0"/>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><div class="field-label" style="font-size:11px">Home Team</div><input class="field-input" id="ko-home" placeholder="e.g. Brazil" style="margin-bottom:0"/></div>
        <div style="flex:1"><div class="field-label" style="font-size:11px">Away Team</div><input class="field-input" id="ko-away" placeholder="e.g. France" style="margin-bottom:0"/></div>
      </div>
      <div>
        <div class="field-label" style="font-size:11px">Round Label</div>
        <input class="field-input" id="ko-round" placeholder="e.g. R32 / QF / SF / Final" style="margin-bottom:0"/>
      </div>
      <button class="btn-primary" id="ko-add-btn">Add Match</button>
    </div>
  </div>`;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents() {
  // Auth
  const authU = document.getElementById("auth-u");
  const authP = document.getElementById("auth-p");
  if (authU) authU.addEventListener("input", e => { state.authForm.u = e.target.value; });
  if (authP) {
    authP.addEventListener("input", e => { state.authForm.p = e.target.value; });
    authP.addEventListener("keydown", e => { if(e.key==="Enter") state.screen==="register" ? register() : login(); });
  }
  document.getElementById("auth-submit")?.addEventListener("click", () => state.screen==="register" ? register() : login());
  document.getElementById("auth-toggle")?.addEventListener("click", () => {
    state.screen = state.screen==="login" ? "register" : "login";
    state.authErr = "";
    render();
  });

  // Nav
  document.querySelectorAll(".nav-btn[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); });
  });

  // Logout
  document.getElementById("logout-btn")?.addEventListener("click", logout);

  // Score inputs (today)
  document.querySelectorAll(".score-input[data-mid]").forEach(inp => {
    inp.addEventListener("input", e => {
      const mid = e.target.dataset.mid;
      const side = e.target.dataset.side;
      if (!state.scoreInputs[mid]) state.scoreInputs[mid] = {h:"",a:""};
      state.scoreInputs[mid][side] = e.target.value;
    });
  });
  document.querySelectorAll(".save-btn[data-save]").forEach(btn => {
    btn.addEventListener("click", () => savePrediction(btn.dataset.save));
  });

  // Admin gate
  const adminPwInp = document.getElementById("admin-pw-input");
  if (adminPwInp) {
    adminPwInp.addEventListener("input", e => { state.adminPwInput = e.target.value; state.adminPwErr = false; });
    adminPwInp.addEventListener("keydown", e => { if(e.key==="Enter") checkAdminPw(); });
  }
  document.getElementById("admin-pw-submit")?.addEventListener("click", checkAdminPw);
  document.getElementById("admin-lock")?.addEventListener("click", () => { state.adminUnlocked = false; render(); });

  // Admin result inputs
  document.querySelectorAll(".admin-input[data-amid]").forEach(inp => {
    inp.addEventListener("input", e => {
      const mid = e.target.dataset.amid;
      const side = e.target.dataset.side;
      if (!state.adminInputs[mid]) state.adminInputs[mid] = {h:"",a:""};
      state.adminInputs[mid][side] = e.target.value;
    });
  });
  document.querySelectorAll(".admin-save-btn[data-save-result]").forEach(btn => {
    btn.addEventListener("click", () => saveResult(btn.dataset.saveResult));
  });

  // Bonus inputs
  document.querySelectorAll(".bonus-input[data-bonus-uid]").forEach(inp => {
    inp.addEventListener("input", e => { state.bonusInputs[e.target.dataset.bonusUid] = e.target.value; });
  });
  document.querySelectorAll(".bonus-btn[data-award-bonus]").forEach(btn => {
    btn.addEventListener("click", () => saveBonus(btn.dataset.awardBonus));
  });

  // Knockout add
  document.getElementById("ko-add-btn")?.addEventListener("click", () => {
    const date  = document.getElementById("ko-date")?.value;
    const home  = document.getElementById("ko-home")?.value?.trim();
    const away  = document.getElementById("ko-away")?.value?.trim();
    const round = document.getElementById("ko-round")?.value?.trim() || "KO";
    if (!date || !home || !away) { toast("Fill in all knockout match fields"); return; }
    addKnockoutMatch(date, home, away, round);
  });
}

function checkAdminPw() {
  if (state.adminPwInput === ADMIN_PW) {
    state.adminUnlocked = true;
    state.adminPwErr = false;
    render();
  } else {
    state.adminPwErr = true;
    state.adminPwInput = "";
    render();
  }
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
