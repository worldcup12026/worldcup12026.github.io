  .auth-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:1px;color:var(--white);text-align:center;margin-bottom:4px}

  .field-label{color:var(--muted);font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;display:block}
  .field-input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;outline:none;padding:11px 14px;width:100%;transition:border .15s;margin-bottom:14px;font-family:inherit}

  .btn-primary{background:linear-gradient(135deg,var(--green2),#00a040);border:none;border-radius:9px;color:#000;cursor:pointer;font-size:15px;font-weight:800;padding:13px 0;width:100%;letter-spacing:0.3px;transition:opacity .15s}
  .btn-primary:hover{opacity:.9}
  .auth-switch{color:var(--green);background:none;border:none;cursor:pointer;font-size:13px;text-decoration:underline;margin-top:14px}
  .err-box{background:rgba(255,61,87,.1);border:1px solid rgba(255,61,87,.3);border-radius:8px;color:#ff6b7a;font-size:13px;margin-bottom:14px;padding:9px 12px}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:0.5px;color:var(--white)}

  .points-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-wrap:wrap;gap:14px;margin-bottom:20px;padding:12px 16px}
  .pt-pill{font-size:12px;font-weight:600}
  .match-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border .2s}

  .match-header{align-items:center;display:flex;justify-content:space-between;padding:12px 16px 0}
  .group-tag{background:rgba(0,230,118,.1);border-radius:4px;color:var(--green);font-size:11px;font-weight:700;letter-spacing:0.8px;padding:2px 8px;text-transform:uppercase}
  .match-status{font-size:12px;font-weight:600}

  .card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.7)}

async function fetchAndUpdateResults() {
  try {
    // TheSportsDB League ID 4429 = FIFA World Cup, free tier, no CORS issues
    const url = "https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4429&s=2026";
    const resp = await fetch(url);
    if (!resp.ok) { console.warn("TheSportsDB not OK:", resp.status); return; }
    const data = await resp.json();
    const events = data.events || [];
    if (!events.length) { console.warn("No events from TheSportsDB"); return; }

    let updated = false;
    for (const ev of events) {
      // Only process finished matches with scores
      if (!ev.intHomeScore || !ev.intAwayScore) continue;
      if (ev.strStatus !== "Match Finished" && ev.strStatus !== "FT") continue;

      const homeName = normalizeTeam(ev.strHomeTeam);
      const awayName = normalizeTeam(ev.strAwayTeam);

      const match = allMatches().find(gm =>
        gm.home === homeName && gm.away === awayName
      );
      if (!match) continue;

      const mid = String(match.id);
      const newH = String(ev.intHomeScore);
      const newA = String(ev.intAwayScore);

      if (!S.results[mid] || S.results[mid].h !== newH || S.results[mid].a !== newA) {
        S.results[mid] = {h: newH, a: newA};
        updated = true;
        console.log(`✅ ${homeName} ${newH}-${newA} ${awayName}`);
      }
    }

    if (updated) {
      // Do NOT save to Firebase — results are always fetched live
      console.log("✅ Results updated from TheSportsDB API");
      render();
    } else {
      console.log("ℹ️ No new results from API — using seed data");
    }
  } catch(e) {
    console.warn("TheSportsDB fetch failed:", e.message);
  }
}

// ── POINTS (draw-aware) ───────────────────────────────────────────────────────
function winner(h, a) {
  const hh = Number(h), aa = Number(a);
  return hh > aa ? "h" : hh < aa ? "a" : "d";
}
function calcPoints(uid) {
  const preds = S.predictions[uid] || {};
  let pts = 0;
  for (const [mid, pred] of Object.entries(preds)) {
    const res = S.results[mid];
    if (!res) continue;
    // winner() returns "h" (home win), "a" (away win), or "d" (draw)
    const pw = winner(pred.h, pred.a);
    const rw = winner(res.h,  res.a);
    const exactScore = String(pred.h)===String(res.h) && String(pred.a)===String(res.a);
    if (exactScore) {
      pts += 7;  // exact score → 7 pts (covers winner too, no need to add 3)
    } else if (pw === rw) {
      pts += 3;  // correct outcome only (right winner or right draw) → 3 pts
    }
    // wrong outcome → 0 pts
  }
  return pts + (S.bonuses[uid] || 0);
}
function leaderboard() {
  return Object.keys(S.users).map(uid => ({
    uid, username:S.users[uid].username, pts:calcPoints(uid),
  })).sort((a,b) => b.pts - a.pts);
}
function myRank() {
  const b = leaderboard(); return b.findIndex(x=>x.uid===S.me)+1;
}

// ── DATE ─────────────────────────────────────────────────────────────────────
function germanNow() {
  // Returns a Date object in German local time
  return new Date(new Date().toLocaleString("en-US", {timeZone:"Europe/Berlin"}));
}
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayStr()    { return dateStr(germanNow()); }
function tomorrowStr() { const d=germanNow(); d.setDate(d.getDate()+1); return dateStr(d); }
function allMatches() {
  return [...GROUP_MATCHES,...S.knockoutMatches].sort((a,b)=>a.date>b.date?1:-1);
}
function matchKickoffPassed(m) {
  // Returns true if kickoff time has already passed in German time
  const now = germanNow();
  const [h,min] = (m.kickoff||"23:59").split(":").map(Number);
  const ko = new Date(now);
  // parse match date
  const [yr,mo,dy] = m.date.split("-").map(Number);
  ko.setFullYear(yr); ko.setMonth(mo-1); ko.setDate(dy);
  ko.setHours(h, min, 0, 0);
  return now >= ko;
}
function matchesForDay(dayStr) {
  // Only show matches that haven't kicked off yet (for today), or all (for tomorrow)
  return allMatches().filter(m => {
    if (m.date !== dayStr) return false;
    if (dayStr === todayStr()) return !matchKickoffPassed(m);
    return true;
  });
}

    // Fix Xani Uruguay 2-8 → 2-0
    if (fixPreds?.xani?.["39"]?.a === "8" || fixPreds?.xani?.["39"]?.a === 8) {
      fixPreds.xani["39"] = {h:"2", a:"0"};
      fixChanged = true;
    }
    if (!fixPreds?.xani) fixPreds.xani = {};
    if (!fixPreds?.erdi) fixPreds.erdi = {};
    // Xani missing predictions
    if (!fixPreds.xani["44"]) { fixPreds.xani["44"] = {h:"1",a:"2"}; fixChanged=true; }  // Jordan vs Algeria
    if (!fixPreds.xani["41"]) { fixPreds.xani["41"] = {h:"2",a:"1"}; fixChanged=true; }  // Argentina vs Austria
    if (!fixPreds.xani["104"]) { fixPreds.xani["104"] = {h:"2",a:"1"}; fixChanged=true; } // Netherlands vs Morocco (Xani: 2-1)
    if (!fixPreds.xani["105"]) { fixPreds.xani["105"] = {h:"1",a:"0"}; fixChanged=true; } // Ivory Coast vs Norway (Xani: 1-0)
    // Erdi missing prediction
    if (!fixPreds.erdi["104"]) { fixPreds.erdi["104"] = {h:"2",a:"0"}; fixChanged=true; } // Netherlands vs Morocco (Erdi: 2-0)
    if (fixChanged) {
      await setDoc(doc(db,"wc26","predictions"), fixPreds);
      console.log("✅ Missing predictions added for Xani and Erdi");
    }
  }

  // ALWAYS force-remove matches 25,26,27,28 from ALL users in Firebase
  // These are: Czechia/SA(25), Switzerland/Bosnia(26), Canada/Qatar(27), Mexico/SKorea(28)
  // Load live Firebase predictions — these are the source of truth
  const REMOVE_MIDS = ["25","26","27","28"];
  const liveSnap = await getDoc(doc(db,"wc26","predictions"));
  const livePreds = liveSnap.exists() ? liveSnap.data() : {};

  // NEVER overwrite existing Firebase predictions — those are real user picks
  // Only ADD seed predictions for matches not already in Firebase
  const mergedPreds = JSON.parse(JSON.stringify(livePreds));
  Object.keys(SEED_PREDICTIONS).forEach(uid => {
    if (!mergedPreds[uid]) mergedPreds[uid] = {};
    Object.keys(SEED_PREDICTIONS[uid]).forEach(mid => {
      if (!REMOVE_MIDS.includes(mid) && !mergedPreds[uid][mid]) {
        mergedPreds[uid][mid] = SEED_PREDICTIONS[uid][mid];
      }
    });
  });

  // Always remove the 4 equalised matches from every user
  let cleaned = false;
  Object.keys(mergedPreds).forEach(uid => {
    REMOVE_MIDS.forEach(mid => {
      if (mergedPreds[uid]?.[mid]) {
        delete mergedPreds[uid][mid];
        cleaned = true;
      }
    });
  });

  await setDoc(doc(db,"wc26","predictions"), mergedPreds);
  S.predictions = mergedPreds;
  console.log("✅ Firebase picks preserved — seed only fills missing gaps");
  if (cleaned) console.log("✅ Matches 25/26/27/28 removed from all users");
  const saved = sessionStorage.getItem("wc26_user");
  // Wait briefly for listeners to fire then fetch API results
  setTimeout(async () => {
    if(saved && S.users[saved]) { S.me=saved; S.screen="app"; }
    else S.screen="login";
    render();
    // Silently fetch latest results from API in background
    await fetchAndUpdateResults();
  }, 1500);
}

async function register() {
  const {u,p}=S.authForm;
  if(!u.trim()||!p.trim()){S.authErr="Fill in both fields.";render();return;}
  const uid=u.toLowerCase().replace(/\s+/g,"_");

  S.users[uid]={username:u,password:p};
  await fbSet("wc26/users",S.users);
  sessionStorage.setItem("wc26_user",uid);
  S.me=uid;S.screen="app";S.authErr="";render();
}
async function login() {
  const {u,p}=S.authForm;
  const uid=u.toLowerCase().replace(/\s+/g,"_");
  const user=S.users[uid];
  if(!user){S.authErr="User not found.";render();return;}
  if(user.password!==p){S.authErr="Wrong password.";render();return;}
  sessionStorage.setItem("wc26_user",uid);
  S.me=uid;S.screen="app";S.authErr="";render();
}

}
async function saveAllPredictions() {
  const day = S.matchDay === "tomorrow" ? tomorrowStr() : todayStr();
  // Only save for matches that haven't started and haven't been predicted yet
  const matches = matchesForDay(day).filter(m =>
    !S.predictions[S.me]?.[m.id] && !matchKickoffPassed(m)
  );
  let saved = 0;
  for (const m of matches) {
    const inp = S.scoreInputs[m.id];
    if (!inp || inp.h==="" || inp.a==="") continue;
    if (!S.predictions[S.me]) S.predictions[S.me] = {};
    S.predictions[S.me][m.id] = {h: inp.h, a: inp.a};
    saved++;
  }
  if (!saved) { toast("Fill in at least one score first"); return; }
  await fbSet("wc26/predictions", S.predictions);
  toast(`${saved} prediction${saved>1?"s":""} submitted! ✅`);
  render();
}

function downloadResultsExcel() {
  const USERS = ["joni","xani","erdi"];
  const allPredMids = new Set();
  USERS.forEach(uid => Object.keys(S.predictions[uid]||{}).forEach(mid => allPredMids.add(mid)));

  const rows = [...allPredMids].map(mid => {
    const match = allMatches().find(m => m.id === Number(mid));
    const res = S.results[mid];
    const row = {
      "#": "",
      "Match": match ? `${match.home} vs ${match.away}` : `Match #${mid}`,
      "Date": match ? match.date : "",
      "Group": match ? match.group : "",
    };
    USERS.forEach(uid => {
      const pred = S.predictions[uid]?.[mid];
      const uname = S.users[uid]?.username || uid;
      row[`${uname} Pick`] = pred ? `${pred.h}-${pred.a}` : "-";
      const {pts, outcome} = getOutcome(pred, res);
      row[`${uname} Pts`] = outcome === "pending" ? "-" : String(pts);
    });
    row["Result"] = res ? `${res.h}-${res.a}` : "Pending";
    return row;
  }).filter(r => r.Match)
    .sort((a,b) => a.Date > b.Date ? -1 : 1);

  // Add row numbers bottom-up (match 1 at bottom)
  const total = rows.length;
  rows.forEach((r,i) => { r["#"] = total - i; });

  // Add totals row
  const totalsRow = { "#": "", "Match": "TOTAL POINTS", "Date": "", "Group": "" };
  USERS.forEach(uid => {
    const uname = S.users[uid]?.username || uid;
    totalsRow[`${uname} Pick`] = "";
    totalsRow[`${uname} Pts`] = String(calcPoints(uid));
  });
  totalsRow["Result"] = "";
  rows.push(totalsRow);

  // Build worksheet
  const ws = XLSX.utils.json_to_sheet(rows, {
    header: ["#","Match","Date","Group",
      ...["joni","xani","erdi"].flatMap(uid => {
        const uname = S.users[uid]?.username || uid;
        return [`${uname} Pick`, `${uname} Pts`];
      }),
      "Result"
    ]
  });

  // Column widths
  ws["!cols"] = [
    {wch:4},{wch:28},{wch:12},{wch:8},
    {wch:12},{wch:8},{wch:12},{wch:8},{wch:12},{wch:8},
    {wch:10}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "WC2026 Results");
  XLSX.writeFile(wb, "WC2026_Results.xlsx");
}

function getOutcome(pred, res) {
  if (!pred || !res) return {pts:0, outcome:"pending"};
  const pw=winner(pred.h,pred.a), rw=winner(res.h,res.a);
  const exact=String(pred.h)===String(res.h)&&String(pred.a)===String(res.a);
  if(exact) return {pts:7, outcome:"exact"};
  if(pw===rw) return {pts:3, outcome:"correct"};
  return {pts:0, outcome:"wrong"};
}

  S.picks = picks;
  await fbSet("wc26/picks", picks);
  toast("Picks saved! 🏆");
  render();
}

function renderPicks() {
  const myPicks = S.picks?.[S.me] || null;
  const allUsers = ["joni","xani","erdi"];
  const TEAMS = [
    "Argentina","Brazil","France","England","Germany","Spain","Portugal",
    "Netherlands","Belgium","USA","Mexico","Canada","Colombia","Uruguay",
    "Morocco","Japan","South Korea","Australia","Croatia","Switzerland",
    "Norway","Scotland","Sweden","Austria","Poland","Ivory Coast","Ghana",
    "Senegal","Tunisia","Egypt","Saudi Arabia","Iran","South Korea","Türkiye"
  ].sort();

  return `
  <div class="section-title">🏆 Tournament Picks</div>
  <div class="section-sub">One-time predictions — locked once submitted</div>

  ${myPicks
    ? `<div style="background:#0a1810;border:1px solid #1a3a22;border-radius:12px;padding:18px;margin-bottom:20px">
        <div style="color:var(--green);font-weight:700;font-size:14px;margin-bottom:12px">✅ Your picks are locked in</div>
        <div style="color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Top Scorer Picks</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          ${myPicks.scorers.map(s=>`<span style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);border-radius:20px;padding:4px 14px;color:var(--green);font-weight:600;font-size:13px">⚽ ${s}</span>`).join("")}
        </div>
        <div style="color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">World Cup Winner</div>
        <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.3);border-radius:20px;padding:6px 16px">
          <span style="font-size:20px">${flag(myPicks.team)||"🏆"}</span>
          <span style="color:var(--gold);font-weight:700;font-size:14px">${myPicks.team||"—"}</span>
        </div>
      </div>`
    : `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
        <div style="color:#e0ecf4;font-size:14px;font-weight:700;margin-bottom:16px">Zgjedh tre lojtarë që mund të jenë Top Scorer</div>
        ${[0,1,2].map(i=>`
          <div style="margin-bottom:10px">
            <label class="field-label" style="font-size:11px">Player ${i+1}</label>
            <input class="field-input" id="scorer-${i}" placeholder="e.g. Messi, Mbappé, Haaland..."
              value="${S.picksInputs.scorers[i]||""}"
              style="margin-bottom:0"/>
          </div>`).join("")}
        <div style="margin-top:16px;margin-bottom:16px">
          <div style="color:#e0ecf4;font-size:14px;font-weight:700;margin-bottom:10px">Which team will win the World Cup?</div>
          <select id="team-pick" class="field-input" style="margin-bottom:0;cursor:pointer">
            <option value="">— Select a team —</option>
            ${TEAMS.map(t=>`<option value="${t}" ${S.picksInputs.team===t?"selected":""}>${flag(t)} ${t}</option>`).join("")}
          </select>
        </div>
        <button class="btn-primary" id="save-picks-btn" style="margin-top:4px">🔒 Lock In My Picks</button>
      </div>`}

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
      <div style="font-size:14px;font-weight:700;color:#e0ecf4">Everyone's Picks</div>
    </div>
    <table class="history-table" style="width:100%">
      <thead><tr>
        <th></th>
        <th style="text-align:center">Top Scorers</th>
        <th style="text-align:center">WC Winner</th>
      </tr></thead>
      <tbody>
        ${allUsers.map(uid=>{
          const p = S.picks?.[uid];
          return `<tr>
            <td style="font-weight:700;color:#e0ecf4;font-size:13px">${S.users[uid]?.username||uid}</td>
            <td style="text-align:center">
              ${p?.scorers?.length
                ? p.scorers.map(s=>`<div style="font-size:12px;color:var(--green);font-weight:600">⚽ ${s}</div>`).join("")
                : `<span style="color:var(--muted);font-size:12px">Not picked yet</span>`}
            </td>
            <td style="text-align:center">
              ${p?.team
                ? `<div style="font-size:13px;font-weight:700;color:var(--gold)">${flag(p.team)} ${p.team}</div>`
                : `<span style="color:var(--muted);font-size:12px">Not picked yet</span>`}
            </td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderPrices() {
  const isFlipped = !!S.flippedCards["main"];
  return `
  <div class="section-title">🎁 Prizes</div>
  <div class="section-sub">Tap the card to flip it</div>
  <div class="card-pack" data-card-id="main" style="width:100%;max-width:420px;margin:24px auto 0">
    <div class="card-inner ${isFlipped?"flipped":""}">
      <div class="card-face card-back">
        <img src="backcard.png" alt="Card back"
          onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#0a1a2e,#1a3a5c)'"/>
        <div style="position:absolute;bottom:16px;left:0;right:0;text-align:center;color:rgba(255,255,255,.4);font-size:13px;font-weight:600">
          Tap to flip
        </div>
      </div>
      <div class="card-face card-front">
        <img src="frontcard.png" alt="Prize"
          onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#0a2a0a,#1a5a1a)'"/>
      </div>
    </div>
  </div>`;
}

function renderAdmin() {
  if(!S.adminUnlocked) return `
  <div class="admin-gate">
    <div class="lock-icon">🔐</div>
    <div class="gate-title">Admin Access</div>
    <div class="gate-sub">Enter the admin password to continue</div>
    ${S.adminPwErr?`<div class="err-box" style="margin-bottom:12px">Wrong password. Try again.</div>`:""}
    <input class="gate-input ${S.adminPwErr?"err":""}" id="admin-pw-input" type="password" placeholder="Password" value="${S.adminPwInput}"/>
    <button class="gate-btn" id="admin-pw-submit">Unlock</button>
  </div>`;

  const today=todayStr();
  const pastMatches=allMatches().filter(m=>m.date<=today);
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div class="section-title">Admin Panel</div>
    <button class="lock-btn" id="admin-lock">🔒 Lock</button>
  </div>
  <div class="section-sub">Enter results & award bonus points</div>
  <div class="admin-section-title">⚽ Match Results</div>
  ${pastMatches.map(m=>{
    const res=S.results[m.id];
    const inp=S.adminInputs[m.id]||{h:"",a:""};
    return `<div class="admin-card">
      <div class="admin-match-date">${m.date} · ${m.group}</div>
      <div class="admin-match-title">${flag(m.home)} ${m.home} vs ${m.away} ${flag(m.away)}</div>
      <div class="admin-row">
        <input class="admin-input" type="number" min="0" max="20" placeholder="${res?.h??0}" value="${inp.h}" data-amid="${m.id}" data-side="h"/>
        <span style="color:var(--muted)">—</span>
        <input class="admin-input" type="number" min="0" max="20" placeholder="${res?.a??0}" value="${inp.a}" data-amid="${m.id}" data-side="a"/>
        <button class="admin-save-btn" data-save-result="${m.id}">${res?"Update":"Save"}</button>
        ${res?`<span class="admin-saved">✓ ${res.h}–${res.a}</span>`:""}
      </div>
    </div>`;}).join("")}
  <div class="admin-section-title">🏆 Bonus Points</div>
  <div style="color:var(--muted);font-size:12px;margin-bottom:12px">Award +100 for daily top scorer, +50 for tournament winner, etc.</div>
  ${Object.keys(S.users).map(uid=>`
    <div class="admin-card">
      <div class="bonus-row">
        <div class="bonus-name">${S.users[uid].username} <span class="bonus-current">(${S.bonuses[uid]||0} bonus pts)</span></div>
        <input class="bonus-input" type="number" placeholder="+pts" value="${S.bonusInputs[uid]||""}" data-bonus-uid="${uid}"/>
        <button class="bonus-btn" data-award-bonus="${uid}">Add</button>
      </div>
    </div>`).join("")}
  <div class="admin-section-title">➕ Add Knockout Match</div>
  <div style="color:var(--muted);font-size:12px;margin-bottom:12px">Add matches as knockout rounds are confirmed</div>
  <div class="admin-card">
    <div style="display:grid;gap:10px">
      <div><label class="field-label" style="font-size:11px">Date</label><input class="field-input" id="ko-date" type="date" style="margin-bottom:0"/></div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><label class="field-label" style="font-size:11px">Home Team</label><input class="field-input" id="ko-home" placeholder="e.g. Brazil" style="margin-bottom:0"/></div>
        <div style="flex:1"><label class="field-label" style="font-size:11px">Away Team</label><input class="field-input" id="ko-away" placeholder="e.g. France" style="margin-bottom:0"/></div>
      </div>
      <div><label class="field-label" style="font-size:11px">Round</label><input class="field-input" id="ko-round" placeholder="e.g. R32 / QF / SF / Final" style="margin-bottom:0"/></div>
      <button class="btn-primary" id="ko-add-btn">Add Match</button>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents() {
  const authU=document.getElementById("auth-u");
  const authP=document.getElementById("auth-p");
  if(authU) authU.addEventListener("input",e=>{S.authForm.u=e.target.value;});
  if(authP){
    authP.addEventListener("input",e=>{S.authForm.p=e.target.value;});
    authP.addEventListener("keydown",e=>{if(e.key==="Enter") S.screen==="register"?register():login();});
  }
  document.getElementById("auth-submit")?.addEventListener("click",()=>S.screen==="register"?register():login());
  document.getElementById("auth-toggle")?.addEventListener("click",()=>{S.screen=S.screen==="login"?"register":"login";S.authErr="";render();});
  document.querySelectorAll(".nav-btn[data-tab]").forEach(btn=>btn.addEventListener("click",()=>{S.tab=btn.dataset.tab;render();}));
  document.getElementById("logout-btn")?.addEventListener("click",logout);
  document.querySelectorAll(".score-input[data-mid]").forEach(inp=>inp.addEventListener("input",e=>{
    const mid=e.target.dataset.mid,side=e.target.dataset.side;
    if(!S.scoreInputs[mid]) S.scoreInputs[mid]={h:"",a:""};
    S.scoreInputs[mid][side]=e.target.value;
  }));
  document.getElementById("save-all-btn")?.addEventListener("click",saveAllPredictions);
  document.getElementById("day-today")?.addEventListener("click",()=>{S.matchDay="today";render();});
  document.getElementById("day-tomorrow")?.addEventListener("click",()=>{S.matchDay="tomorrow";render();});
  const adminPwInp=document.getElementById("admin-pw-input");
  if(adminPwInp){
    adminPwInp.addEventListener("input",e=>{S.adminPwInput=e.target.value;S.adminPwErr=false;});
    adminPwInp.addEventListener("keydown",e=>{if(e.key==="Enter")checkAdminPw();});
  }
  document.getElementById("admin-pw-submit")?.addEventListener("click",checkAdminPw);
  document.getElementById("admin-lock")?.addEventListener("click",()=>{S.adminUnlocked=false;render();});
  document.querySelectorAll(".admin-input[data-amid]").forEach(inp=>inp.addEventListener("input",e=>{
    const mid=e.target.dataset.amid,side=e.target.dataset.side;
    if(!S.adminInputs[mid]) S.adminInputs[mid]={h:"",a:""};
    S.adminInputs[mid][side]=e.target.value;
  }));
  document.querySelectorAll(".admin-save-btn[data-save-result]").forEach(btn=>btn.addEventListener("click",()=>saveResult(btn.dataset.saveResult)));
  document.querySelectorAll(".bonus-input[data-bonus-uid]").forEach(inp=>inp.addEventListener("input",e=>{S.bonusInputs[e.target.dataset.bonusUid]=e.target.value;}));
  document.querySelectorAll(".bonus-btn[data-award-bonus]").forEach(btn=>btn.addEventListener("click",()=>saveBonus(btn.dataset.awardBonus)));
  // Picks tab
  document.getElementById("save-picks-btn")?.addEventListener("click", savePicks);
  document.getElementById("download-excel-btn")?.addEventListener("click", downloadResultsExcel);
  document.querySelectorAll(".card-pack[data-card-id]").forEach(card => {
    card.addEventListener("click", () => {
      const id = card.dataset.cardId;
      S.flippedCards[id] = !S.flippedCards[id];
      render();
    });
  });
  [0,1,2].forEach(i => {
    document.getElementById(`scorer-${i}`)?.addEventListener("input", e => {
      S.picksInputs.scorers[i] = e.target.value;
    });
  });
  document.getElementById("team-pick")?.addEventListener("change", e => {
    S.picksInputs.team = e.target.value;
  });

  document.getElementById("ko-add-btn")?.addEventListener("click",()=>{
    const date=document.getElementById("ko-date")?.value;
    const home=document.getElementById("ko-home")?.value?.trim();
    const away=document.getElementById("ko-away")?.value?.trim();
    const round=document.getElementById("ko-round")?.value?.trim()||"KO";
    if(!date||!home||!away){toast("Fill in all fields");return;}
    addKnockoutMatch(date,home,away,round);
  });
}

init();
</script>
</body>
</html>
